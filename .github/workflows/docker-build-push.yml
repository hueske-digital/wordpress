name: Build and Push Docker image

env:
  OWN_IMAGE: ghcr.io/hueske-digital/wordpress
  LAST_PHP_VERSION: 8.4 # Die letzte PHP-Version, die als latest gepusht wird

on:
  push:
    branches:
      - main

  schedule:
    - cron: '0 0 * * 1'

jobs:
  build-and-tag:
    permissions:
      contents: write
      packages: write

    runs-on: ubuntu-latest

    strategy:
      matrix:
        php_version: [8.3, 8.4] # Die zu bauenden PHP-Versionen

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WordPress Docker image
        uses: docker/build-push-action@v3
        with:
          push: true
          context: ./build
          file: ./build/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          # Wichtig: Hier die Tags definieren
          tags: |
            # 1) Immer ein Tag phpX.Y
            ${{ env.OWN_IMAGE }}:php${{ matrix.php_version }}
            # 2) Nur wenn php_version == LAST_PHP_VERSION => latest-Tag
            #    Dabei werden zwei Expressions hintereinander geschrieben.
            #    Falls die Bedingung false ist, beide empty => kein Tag.
            ${{ matrix.php_version == env.LAST_PHP_VERSION && env.OWN_IMAGE || '' }}${{ matrix.php_version == env.LAST_PHP_VERSION && ':latest' || '' }}
